spring.application.name=smo
server.port=8080
server.address=0.0.0.0
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:PremSai}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Override in env for production: SMO_DATA_KEY
app.security.aes-key=${SMO_DATA_KEY:SMO_DEFAULT_32_CHAR_SECRET_KEY_!}

# Service Discovery Configuration
smo.service.name=SMO-Backend
smo.service.version=1.0.0
app.base-url=http://localhost

# Production-Safe Logging
logging.level.com.cutm.smo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN